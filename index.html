<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マイ・ゲームセンター</title>
    <style>
        body {
            margin: 0; padding: 20px;
            background-color: #222;
            color: #9bbc0f;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }
        h1 {
            color: #8bac0f;
            border-bottom: 2px dashed #306230;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        /* リンクボタンのデザイン */
        a.game-btn {
            display: block;
            padding: 20px;
            background-color: #306230;
            color: #9bbc0f;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            border: 4px solid #8bac0f;
            border-radius: 15px;
            box-shadow: 0 5px 0 #0f380f;
            transition: 0.1s;
        }
        a.game-btn:active {
            transform: translateY(5px);
            box-shadow: none;
            background-color: #0f380f;
        }
    </style>
</head>
<body>

    <h1>🕹️ GAME CENTER 🕹️</h1>
    <p>2026060600 ver.</p>
    <p>遊びたいゲームを選んでね！</p>

    <div class="menu-container">
        <a href="action.html" class="game-btn">🏃 レトロジャンプ</a>

        <a href="action_v2.html" class="game-btn">🏃 レトロジャンプⅡ</a>
        
        <a href="shoot.html" class="game-btn">🚀 シューティング</a>
    </div>

</body>
</html>
