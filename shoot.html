<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>レトロシューティング</title>
    <style>
        :root {
            --color-1: #0f380f; /* 一番濃い緑 */
            --color-2: #306230; 
            --color-3: #8bac0f; 
            --color-4: #9bbc0f; /* 一番薄い緑（背景） */
        }

        body {
            margin: 0; padding: 0;
            background-color: #222;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100dvh; overflow: hidden;
            touch-action: none;
            font-family: 'Courier New', Courier, monospace;
        }

        #game-container {
            background-color: var(--color-4);
            border: 10px solid #555;
            border-radius: 10px 10px 30px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            padding: 10px;
            position: relative;
        }

        canvas {
            display: block;
            background-color: var(--color-4);
            border: 2px solid var(--color-2);
        }

        .instructions {
            color: #fff; margin-top: 20px; text-align: center; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="320" height="420"></canvas>
    </div>
    
    <div class="instructions">
        画面をドラッグ（スワイプ）して自機を移動！<br>弾は自動で連射されます
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const bgm = new Audio("Against_The_Swarm.mp3");
        bgm.loop = true; // 音楽をループ再生させる
        bgm.preload = "auto"; // 先読みを指示
        
        let frame = 0;
        let score = 0;
        let gameOver = false;
        let gameStarted = false;

        const COLOR_DARK = "#0f380f";
        const COLOR_LIGHT = "#9bbc0f";

        // 自機（プレイヤー）の設定
        const player = {
            x: 160,
            y: 360,
            width: 24,
            height: 16,
            speed: 8
        };

        let bullets = [];
        let enemies = [];

        // スマホのタッチ操作（ドラッグで自機を動かす）
        window.addEventListener("touchstart", (e) => {
            if (!gameStarted) {
                gameStarted = true;
                bgm.play().catch(err => console.log("再生失敗: ", err));
                resetGame();
                loop();
                return;
            }
            if (gameOver) {
                bgm.play().catch(err => console.log("再生失敗: ", err));
                resetGame();
                loop();
                return;
            }
            movePlayer(e);
        });

        window.addEventListener("touchmove", (e) => {
            if (gameStarted && !gameOver) {
                movePlayer(e);
            }
        });

        function movePlayer(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            // 指の位置が自機の中心にくるように計算
            let targetX = touch.clientX - rect.left - player.width / 2;
            
            // 画面外にはみ出さないように制限
            if (targetX < 0) targetX = 0;
            if (targetX > canvas.width - player.width) targetX = canvas.width - player.width;
            
            player.x = targetX;
        }

        function resetGame() {
            player.x = canvas.width / 2 - player.width / 2;
            bullets = [];
            enemies = [];
            score = 0;
            frame = 0;
            gameOver = false;
        }

        function update() {
            if (gameOver) return;

            frame++;

            // 弾の自動発射（8フレームに1発）
            if (frame % 8 === 0) {
                bullets.push({
                    x: player.x + player.width / 2 - 2,
                    y: player.y,
                    width: 4,
                    height: 8,
                    speed: 7
                });
            }

            // 弾の移動
            bullets.forEach(b => b.y -= b.speed);
            bullets = bullets.filter(b => b.y > 0);

            // 敵の出現（スコアに応じて少しずつ頻度が上がる）
            let spawnRate = Math.max(20, 40 - Math.floor(score / 50));
            if (frame % spawnRate === 0) {
                enemies.push({
                    x: Math.random() * (canvas.width - 20),
                    y: -20,
                    width: 20,
                    height: 20,
                    speed: 2 + Math.random() * 2 + (score / 100)
                });
            }

            // 敵の移動
            enemies.forEach(enemy => enemy.y += enemy.speed);

            // 敵が画面最下部に到達したらゲームオーバー
            enemies.forEach(enemy => {
                if (enemy.y > canvas.height) {
                    gameOver = true;
                }
            });

            // 当たり判定：弾と敵
            for (let bIdx = bullets.length - 1; bIdx >= 0; bIdx--) {
                for (let eIdx = enemies.length - 1; eIdx >= 0; eIdx--) {
                    let b = bullets[bIdx];
                    let e = enemies[eIdx];

                    if (b && e &&
                        b.x < e.x + e.width &&
                        b.x + b.width > e.x &&
                        b.y < e.y + e.height &&
                        b.y + b.height > e.y) {
                        
                        // 命中したら両方消してスコア加算
                        bullets.splice(bIdx, 1);
                        enemies.splice(eIdx, 1);
                        score += 10;
                    }
                }
            }

            // 当たり判定：自機と敵
            enemies.forEach(e => {
                if (player.x < e.x + e.width &&
                    player.x + player.width > e.x &&
                    player.y < e.y + e.height &&
                    player.y + player.height > e.y) {
                    gameOver = true;
                }
            });
        }

        function draw() {
            // 画面クリア
            ctx.fillStyle = COLOR_LIGHT;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!gameStarted) {
                ctx.fillStyle = COLOR_DARK;
                ctx.font = "20px Courier New";
                ctx.textAlign = "center";
                ctx.fillText("TAP TO START", canvas.width / 2, canvas.height / 2);
                return;
            }

            // 自機（ちょっとインベーダー風のドット形状）
            ctx.fillStyle = COLOR_DARK;
            // 凸型の突起
            ctx.fillRect(player.x + 10, player.y - 4, 4, 4);
            // 本箱
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // ウィングのディテール
            ctx.fillRect(player.x - 2, player.y + 6, 2, 10);
            ctx.fillRect(player.x + player.width, player.y + 6, 2, 10);

            // 弾を描画
            ctx.fillStyle = COLOR_DARK;
            bullets.forEach(b => {
                ctx.fillRect(b.x, b.y, b.width, b.height);
            });

            // 敵を描画（インベーダーっぽい四角）
            enemies.forEach(e => {
                ctx.fillRect(e.x, e.y, e.width, e.height);
                // 敵の目的なスリット
                ctx.fillStyle = COLOR_LIGHT;
                ctx.fillRect(e.x + 4, e.y + 6, 3, 3);
                ctx.fillRect(e.x + 13, e.y + 6, 3, 3);
                ctx.fillStyle = COLOR_DARK;
            });

            // スコア表示
            ctx.fillStyle = COLOR_DARK;
            ctx.font = "bold 20px Courier New";
            ctx.textAlign = "left";
            ctx.fillText("SCORE: " + score, 10, 30);

            if (gameOver) {
                ctx.fillStyle = COLOR_DARK;
                ctx.font = "bold 30px Courier New";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "16px Courier New";
                ctx.fillText("TAP TO RESTART", canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        function loop() {
            update();
            draw();
            if (!gameOver || frame === 0) {
                requestAnimationFrame(loop);
            }
        }

        draw();
    </script>
</body>
</html>
