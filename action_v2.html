<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>レトロジャンプ</title>
    <style>
        /* 昔の液晶画面風の4階調カラーパレット */
        :root {
            --color-1: #0f380f; /* 一番濃い緑（キャラクターや文字） */
            --color-2: #306230; /* 濃い緑 */
            --color-3: #8bac0f; /* 薄い緑 */
            --color-4: #9bbc0f; /* 一番薄い緑（背景） */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            overflow: hidden;
            touch-action: none; /* スワイプによる画面のズレを防止 */
            font-family: 'Courier New', Courier, monospace;
        }

        /* ゲーム機の画面のフチ */
        #game-container {
            background-color: var(--color-4);
            border: 10px solid #555;
            border-radius: 10px 10px 30px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            padding: 10px;
            position: relative;
        }

        canvas {
            display: block;
            background-color: var(--color-4);
            border: 2px solid var(--color-2);
        }

        .instructions {
            color: #fff;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="300" height="400"></canvas>
    </div>
    
    <div class="instructions">
        画面をタップしてジャンプ！<br>障害物を避けてハイスコアを目指そう
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // BGM設定（ファイルがない場合はエラーを無視して進行します）
        let bgm;
        try {
            bgm = new Audio("Chasing_the_Last_Second.mp3");
            bgm.loop = true;
        } catch (e) {
            console.log("BGM not found");
        }
        
        // ゲームの基本設定
        let frame = 0;
        let score = 0;
        let gameOver = false;
        let gameStarted = false;

        // レトロカラー
        const COLOR_DARK = "#0f380f";
        const COLOR_LIGHT = "#9bbc0f";

        // プレイヤー（四角いキャラクター）
        const player = {
            x: 50,
            y: 200,
            width: 20,
            height: 20,
            dy: 0,        // Y軸の速度
            jumpPower: -9, // ジャンプ力
            grounded: false,
            // --- 追加: アニメーション用プロパティ ---
            animFrame: 0,
            animTimer: 0,
            animSpeed: 8,  // 足をバタバタさせる速さ
            isJumping: false
        };

        const gravity = 0.5;
        const groundY = 320; // 地面の高さ

        let obstacles = [];
        let particles = []; // --- 追加: 土煙エフェクト用の配列 ---

        // タップ（またはキーボードのスペース）でジャンプ
        window.addEventListener("touchstart", handleInput);
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") handleInput();
        });

        function handleInput() {
            if (!gameStarted) {
                gameStarted = true;
                gameOver = false;
                if(bgm) bgm.play().catch(e => console.log("Audio play prevented"));
                
                resetGame();
                loop();
                return;
            }

            if (gameOver) {
                resetGame();
                return;
            }

            // 地面にいる時だけジャンプできる
            if (player.grounded) {
                player.dy = player.jumpPower;
                player.grounded = false;
                
                // --- 追加: ジャンプ時に土煙（パーティクル）を生成 ---
                for (let i = 0; i < 5; i++) {
                    particles.push({
                        x: player.x + player.width / 2 + (Math.random() * 10 - 5),
                        y: player.y + player.height,
                        vx: Math.random() * 2 - 1, // 左右に散る速度
                        vy: Math.random() * -2 - 1, // 上に舞い上がる速度
                        life: 15 // パーティクルが消えるまでの時間
                    });
                }
            }
        }

        function resetGame() {
            player.y = groundY - player.height;
            player.dy = 0;
            player.animFrame = 0;
            player.animTimer = 0;
            obstacles = [];
            particles = [];
            score = 0;
            frame = 0;
            gameOver = false;
        }

        function update() {
            if (gameOver) return;

            frame++;
            
            // スコアを少しずつ増やす
            if (frame % 10 === 0) score++;

            // プレイヤーの動き（重力）
            player.y += player.dy;
            player.dy += gravity;

            // --- 追加: 土煙（パーティクル）の更新 ---
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                // 寿命が尽きたら消す
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // --- 追加: アニメーションの更新 ---
            if (player.grounded) {
                player.isJumping = false;
                player.animTimer++;
                if (player.animTimer > player.animSpeed) {
                    player.animFrame = (player.animFrame === 0) ? 1 : 0;
                    player.animTimer = 0;
                }
            } else {
                player.isJumping = true;
                player.animFrame = 0; // ジャンプ中はポーズを固定
            }

            // 地面との当たり判定
            if (player.y + player.height >= groundY) {
                player.y = groundY - player.height;
                player.dy = 0;
                player.grounded = true;
            }

            // 障害物の出現（ランダムなタイミングで右端から）
            if (frame % Math.floor(Math.random() * 60 + 60) === 0) {
                let size = Math.random() * 20 + 15;
                obstacles.push({
                    x: canvas.width,
                    y: groundY - size,
                    width: 20,
                    height: size,
                    speed: 4 + (score / 200)
                });
            }

            // 障害物の移動と当たり判定
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.x -= obs.speed;

                if (
                    player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y
                ) {
                    gameOver = true;
                }
            }

            // 画面外に出た障害物を消す
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
        }

        function draw() {
            // 画面を一旦リセット
            ctx.fillStyle = COLOR_LIGHT;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 地面の線を描く
            ctx.fillStyle = COLOR_DARK;
            ctx.fillRect(0, groundY, canvas.width, 2);

            if (!gameStarted) {
                ctx.fillStyle = COLOR_DARK;
                ctx.font = "20px Courier New";
                ctx.textAlign = "center";
                ctx.fillText("TAP TO START", canvas.width / 2, canvas.height / 2);
                return;
            }

            // --- 追加: 土煙（パーティクル）の描画 ---
            ctx.fillStyle = COLOR_DARK;
            particles.forEach(p => {
                // 寿命に応じてだんだん小さくする
                let size = (p.life / 15) * 4; 
                ctx.fillRect(p.x, p.y, size, size);
            });

            // --- 変更: プレイヤーの描画（足のアニメーション） ---
            ctx.fillStyle = COLOR_DARK;
            // 胴体（足の分だけ少し短くする）
            ctx.fillRect(player.x, player.y, player.width, player.height - 4);
            
            // 目
            ctx.fillStyle = COLOR_LIGHT;
            ctx.fillRect(player.x + 12, player.y + 4, 4, 4);

            // 足
            ctx.fillStyle = COLOR_DARK;
            if (player.isJumping) {
                // ジャンプ中のポーズ（足を縮める）
                ctx.fillRect(player.x + 4, player.y + player.height - 6, 4, 4);
                ctx.fillRect(player.x + 12, player.y + player.height - 4, 4, 4);
            } else {
                // 走るアニメーション
                if (player.animFrame === 0) {
                    ctx.fillRect(player.x + 4, player.y + player.height - 4, 6, 4);  // 前足
                    ctx.fillRect(player.x + 12, player.y + player.height - 2, 4, 2); // 後ろ足
                } else {
                    ctx.fillRect(player.x + 10, player.y + player.height - 4, 6, 4); // 前足
                    ctx.fillRect(player.x + 4, player.y + player.height - 2, 4, 2);  // 後ろ足
                }
            }

            // 障害物を描く
            ctx.fillStyle = COLOR_DARK;
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });

            // スコアを表示
            ctx.fillStyle = COLOR_DARK;
            ctx.font = "bold 20px Courier New";
            ctx.textAlign = "left";
            ctx.fillText("SCORE: " + score, 10, 30);

            if (gameOver) {
                ctx.fillStyle = COLOR_DARK;
                ctx.font = "bold 30px Courier New";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "16px Courier New";
                ctx.fillText("TAP TO RESTART", canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        function loop() {
            update();
            draw();
            if (!gameOver || frame === 0) {
                requestAnimationFrame(loop);
            }
        }

        // 最初の画面を描画しておく
        draw();

    </script>
</body>
</html>
