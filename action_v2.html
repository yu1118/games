<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>レトロジャンプ</title>
    <style>
        :root {
            --color-1: #0f380f;
            --color-2: #306230;
            --color-3: #8bac0f;
            --color-4: #9bbc0f;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            overflow: hidden;
            touch-action: none;
            font-family: 'Courier New', Courier, monospace;
        }

        #game-container {
            background-color: var(--color-4);
            border: 10px solid #555;
            border-radius: 10px 10px 30px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            padding: 10px;
            position: relative;
        }

        canvas {
            display: block;
            background-color: var(--color-4);
            border: 2px solid var(--color-2);
        }

        .instructions {
            color: #fff;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="300" height="400"></canvas>
    </div>
    
    <div class="instructions">
        タップ（長押しで大ジャンプ）<br>空中でタップで2段ジャンプ！
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let bgm;
        try {
            bgm = new Audio("Chasing_the_Last_Second.mp3");
            bgm.loop = true;
        } catch (e) {
            console.log("BGM not found");
        }
        
        let frame = 0;
        let score = 0;
        let gameOver = false;
        let gameStarted = false;

        const COLOR_DARK = "#0f380f";
        const COLOR_LIGHT = "#9bbc0f";

        const player = {
            x: 50,
            y: 200,
            width: 20,
            height: 20,
            dy: 0,
            jumpPower: -12, // ★大ジャンプのパワーを少し強化
            grounded: false,
            animFrame: 0,
            animTimer: 0,
            animSpeed: 8,
            isJumping: false,
            jumpCount: 0,
            maxJumps: 2
        };

        const gravity = 0.6; // ★ジャンプを強化した分、重力も少し上げてキビキビさせる
        const groundY = 320;

        let obstacles = [];
        let particles = [];

        // ★修正: iPhoneの標準タッチ挙動をキャンセルして正確に検知する { passive: false } が重要
        window.addEventListener("touchstart", (e) => {
            e.preventDefault(); 
            handleInputPress();
        }, { passive: false });

        window.addEventListener("touchend", (e) => {
            e.preventDefault();
            handleInputRelease();
        }, { passive: false });

        // PCのキーボード用
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space" && !e.repeat) handleInputPress();
        });
        window.addEventListener("keyup", (e) => {
            if (e.code === "Space") handleInputRelease();
        });

        function handleInputPress() {
            if (!gameStarted) {
                gameStarted = true;
                gameOver = false;
                if(bgm) bgm.play().catch(e => console.log("Audio play prevented"));
                resetGame();
                loop();
                return;
            }

            if (gameOver) {
                resetGame();
                loop(); // ★修正: これが抜けていたためリスタートできませんでした！
                return;
            }

            if (player.grounded || player.jumpCount < player.maxJumps) {
                player.dy = player.jumpPower;
                player.grounded = false;
                player.jumpCount++;
                
                for (let i = 0; i < 5; i++) {
                    particles.push({
                        x: player.x + player.width / 2 + (Math.random() * 10 - 5),
                        y: player.y + player.height,
                        vx: Math.random() * 2 - 1,
                        vy: Math.random() * -2 - 1,
                        life: 15
                    });
                }
            }
        }

        function handleInputRelease() {
            // ★修正: 指を離したとき、上昇中なら強力にブレーキをかける
            if (player.dy < 0) {
                player.dy *= 0.2; // 0.4から0.2に変更。小ジャンプがよりハッキリします
            }
        }

        function resetGame() {
            player.y = groundY - player.height;
            player.dy = 0;
            player.animFrame = 0;
            player.animTimer = 0;
            player.jumpCount = 0;
            obstacles = [];
            particles = [];
            score = 0;
            frame = 0;
            gameOver = false;
        }

        function update() {
            if (gameOver) return;

            frame++;
            if (frame % 10 === 0) score++;

            player.y += player.dy;
            player.dy += gravity;

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }

            if (player.grounded) {
                player.isJumping = false;
                player.animTimer++;
                if (player.animTimer > player.animSpeed) {
                    player.animFrame = (player.animFrame === 0) ? 1 : 0;
                    player.animTimer = 0;
                }
            } else {
                player.isJumping = true;
                player.animFrame = 0; 
            }

            if (player.y + player.height >= groundY) {
                player.y = groundY - player.height;
                player.dy = 0;
                player.grounded = true;
                player.jumpCount = 0;
            }

            if (frame % Math.floor(Math.random() * 60 + 60) === 0) {
                let size = Math.random() * 20 + 15;
                obstacles.push({
                    x: canvas.width,
                    y: groundY - size,
                    width: 20,
                    height: size,
                    speed: 4 + (score / 200)
                });
            }

            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.x -= obs.speed;

                if (
                    player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y
                ) {
                    gameOver = true;
                }
            }
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
        }

        function draw() {
            ctx.fillStyle = COLOR_LIGHT;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = COLOR_DARK;
            ctx.fillRect(0, groundY, canvas.width, 2);

            if (!gameStarted) {
                ctx.fillStyle = COLOR_DARK;
                ctx.font = "20px Courier New";
                ctx.textAlign = "center";
                ctx.fillText("TAP TO START", canvas.width / 2, canvas.height / 2);
                return;
            }

            ctx.fillStyle = COLOR_DARK;
            particles.forEach(p => {
                let size = (p.life / 15) * 4; 
                ctx.fillRect(p.x, p.y, size, size);
            });

            ctx.fillStyle = COLOR_DARK;
            ctx.fillRect(player.x, player.y, player.width, player.height - 4);
            
            ctx.fillStyle = COLOR_LIGHT;
            ctx.fillRect(player.x + 12, player.y + 4, 4, 4);

            ctx.fillStyle = COLOR_DARK;
            if (player.isJumping) {
                ctx.fillRect(player.x + 4, player.y + player.height - 6, 4, 4);
                ctx.fillRect(player.x + 12, player.y + player.height - 4, 4, 4);
            } else {
                if (player.animFrame === 0) {
                    ctx.fillRect(player.x + 4, player.y + player.height - 4, 6, 4);  
                    ctx.fillRect(player.x + 12, player.y + player.height - 2, 4, 2); 
                } else {
                    ctx.fillRect(player.x + 10, player.y + player.height - 4, 6, 4); 
                    ctx.fillRect(player.x + 4, player.y + player.height - 2, 4, 2);  
                }
            }

            ctx.fillStyle = COLOR_DARK;
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });

            ctx.fillStyle = COLOR_DARK;
            ctx.font = "bold 20px Courier New";
            ctx.textAlign = "left";
            ctx.fillText("SCORE: " + score, 10, 30);

            if (gameOver) {
                ctx.fillStyle = COLOR_DARK;
                ctx.font = "bold 30px Courier New";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "16px Courier New";
                ctx.fillText("TAP TO RESTART", canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        function loop() {
            update();
            draw();
            if (!gameOver || frame === 0) {
                requestAnimationFrame(loop);
            }
        }

        draw();
    </script>
</body>
</html>
